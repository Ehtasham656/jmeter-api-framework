name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code (v5 completely clears the Node 20 warning)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Setup Java environment (v5 completely clears the Node 20 warning)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "11"

      # 3. Download and unpack JMeter binary
      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

      # 4. Run JMeter test (NON-GUI mode with forced Base Directory)
      - name: Run Load Test
        run: |
          # 1. Ensure target output directories are ready
          mkdir -p results reports/html-report

          # 2. Run JMeter with the -d flag pointing to the root workspace folder.
          # This forces JMeter's internal engine to search relative to your repo root,
          # allowing it to properly find test-plans/ and test-data/ configurations.
          apache-jmeter-5.6.3/bin/jmeter -n \
            -d "$GITHUB_WORKSPACE" \
            -t "$GITHUB_WORKSPACE/test-plans/booking-test.jmx" \
            -l "$GITHUB_WORKSPACE/results/result.jtl" \
            -e -o "$GITHUB_WORKSPACE/reports/html-report"

      # 5. Archive and upload the generated dashboard
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
