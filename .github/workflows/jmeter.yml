name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Java (required for JMeter)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # 3. Install JMeter
      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

      # 4. Run JMeter test (NON-GUI mode)
      - name: Run Load Test
        run: |
          # Create missing output directories so JMeter doesn't fail silently
          mkdir -p results reports/html-report

          # Execute the performance test
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t test-plans/booking-test.jmx \
            -l results/result.jtl \
            -e -o reports/html-report

      # 5. Upload HTML report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report/
