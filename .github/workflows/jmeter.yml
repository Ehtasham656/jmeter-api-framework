name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code (v5 completely clears the Node warning)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Setup Java environment (v5 completely clears the Node warning)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. Download JMeter and Common Plugins Jar
      - name: Download JMeter and Ext Libraries
        run: |
          # Download and unpack vanilla JMeter 5.6.3
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

          # Fix the "CannotResolveClassException": Download the core plugins jar directly into the lib/ext folder
          wget -O apache-jmeter-5.6.3/lib/ext/jmeter-plugins-cmn-jmeter-0.7.jar https://repo1.maven.org/maven2/kg/apc/jmeter-plugins-cmn-jmeter/0.7/jmeter-plugins-cmn-jmeter-0.7.jar
          wget -O apache-jmeter-5.6.3/lib/ext/cmdrunner-2.3.jar https://repo1.maven.org/maven2/kg/apc/cmdrunner/2.3/cmdrunner-2.3.jar

      # 4. Run JMeter test (Using absolute paths to avoid context switching bugs)
      - name: Run Load Test
        run: |
          # Create output directories explicitly
          mkdir -p "$GITHUB_WORKSPACE/results"
          mkdir -p "$GITHUB_WORKSPACE/reports/html-report"

          echo "=== Starting JMeter Execution ==="
          "$GITHUB_WORKSPACE/apache-jmeter-5.6.3/bin/jmeter" -n \
            -t "$GITHUB_WORKSPACE/test-plans/booking-test.jmx" \
            -l "$GITHUB_WORKSPACE/results/result.jtl" \
            -e -o "$GITHUB_WORKSPACE/reports/html-report"

      # 5. Archive and upload the generated dashboard
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
