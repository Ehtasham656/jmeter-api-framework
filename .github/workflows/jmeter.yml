name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

# Force all steps to run using Node 24 runtime to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Java (required for JMeter)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # 3. Install JMeter
      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

      # 4. Run JMeter test (NON-GUI mode)
      - name: Run Load Test
        run: |
          # Create clean paths absolute to the working directory
          mkdir -p ${{ github.workspace }}/results
          mkdir -p ${{ github.workspace }}/reports/html-report

          # Execute test plan
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t test-plans/booking-test.jmx \
            -l ${{ github.workspace }}/results/result.jtl \
            -e -o ${{ github.workspace }}/reports/html-report

      # 5. Upload HTML report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: ${{ github.workspace }}/reports/html-report
          if-no-files-found: error
