name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JUST_SCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java environment
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # 3. Download and unpack JMeter binary
      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

      # 4. Execute the load test
      - name: Run Load Test
        run: |
          # Create clean directories in the root workspace
          mkdir -p results reports/html-report

          # CRITICAL FIX: Copy your test-data directory into the JMeter bin folder
          # This ensures JMeter finds 'test-data/booking-data.csv' regardless of its relative pathing configuration
          cp -r test-data apache-jmeter-5.6.3/bin/

          echo "=== Executing JMeter Test Plan ==="
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t test-plans/booking-test.jmx \
            -l results/result.jtl \
            -e -o reports/html-report

      # 5. Archive and upload the generated dashboard
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
