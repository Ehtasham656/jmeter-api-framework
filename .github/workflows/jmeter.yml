name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    # Run all steps inside a pre-built JMeter container
    container:
      image: justb4/jmeter:5.6.3

    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Run JMeter test inside the container environment
      - name: Run Load Test
        run: |
          # Create fresh directories
          mkdir -p results reports/html-report

          # Execute using the container's built-in global 'jmeter' command
          jmeter -n \
            -t test-plans/booking-test.jmx \
            -l results/result.jtl \
            -e -o reports/html-report

      # 3. Upload the generated report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
