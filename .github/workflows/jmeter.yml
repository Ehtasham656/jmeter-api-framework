name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code (v5 clears Node warning)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Setup Java environment (v5 clears Node warning)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17" # Upgraded to 17 for better plugin compatibility

      # 3. Download JMeter + Plugins Manager
      - name: Download JMeter and Plugins Manager
        run: |
          # Download and unpack JMeter 5.6.3
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

          # Download JMeter Plugins Manager JAR
          wget -O apache-jmeter-5.6.3/lib/ext/jmeter-plugins-manager-1.10.jar https://repo1.maven.org/maven2/kg/apc/jmeter-plugins-manager/1.10/jmeter-plugins-manager-1.10.jar

          # Download Command Line Tool wrapper for automated installations
          wget -O apache-jmeter-5.6.3/lib/cmdrunner-2.3.jar https://repo1.maven.org/maven2/kg/apc/cmdrunner/2.3/cmdrunner-2.3.jar
          java -cp apache-jmeter-5.6.3/lib/ext/jmeter-plugins-manager-1.10.jar org.jmeterplugins.repository.PluginManagerCMDInstaller

      # 4. Run JMeter test (NON-GUI mode)
      - name: Run Load Test
        run: |
          mkdir -p results reports/html-report

          # Automatically detect and install any missing plugins found inside your JMX file
          ./apache-jmeter-5.6.3/bin/PluginsManagerCMD.sh install-for-jmx test-plans/booking-test.jmx

          echo "=== Starting JMeter Test ==="
          ./apache-jmeter-5.6.3/bin/jmeter -n \
            -t test-plans/booking-test.jmx \
            -l results/result.jtl \
            -e -o reports/html-report

      # 5. Archive and upload the generated dashboard
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
