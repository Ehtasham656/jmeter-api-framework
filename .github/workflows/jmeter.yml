name: JMeter CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

# Fixes the Node runtime tracking warning shown in your previous runs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Java (required for JMeter)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      # 3. Install JMeter
      - name: Download JMeter
        run: |
          wget https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xvzf apache-jmeter-5.6.3.tgz

      # 4. Run JMeter test (NON-GUI mode)
      - name: Run Load Test
        run: |
          # Ensure execution happens from the repository root workspace
          cd $GITHUB_WORKSPACE

          # Clean and recreate target directories matching image_0bb069.png structure
          rm -rf results reports/html-report
          mkdir -p results reports/html-report

          # Execute using explicit root-relative path targets
          $GITHUB_WORKSPACE/apache-jmeter-5.6.3/bin/jmeter -n \
            -t test-plans/booking-test.jmx \
            -l results/result.jtl \
            -e -o reports/html-report

      # 5. Upload HTML report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/html-report
          if-no-files-found: error
